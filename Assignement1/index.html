<!DOCTYPE html>
<html>
<head>
<title>CV Generator</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container my-4">

<h1 class="text-center">CV Generator</h1>

<div class="row">

<!-- FORM SECTION -->
<div class="col-md-6">

<h3>Enter Your Information</h3>

<input type="text" id="name" class="form-control mb-2" placeholder="Full Name">

<input type="text" id="email" class="form-control mb-2" placeholder="Email">

<input type="text" id="phone" class="form-control mb-2" placeholder="Phone">

<textarea id="address" class="form-control mb-2" placeholder="Address"></textarea>

<h4>Education</h4>

<input type="text" id="degree" class="form-control mb-2" placeholder="Degree">

<input type="text" id="university" class="form-control mb-2" placeholder="University">

<input type="text" id="year" class="form-control mb-2" placeholder="Year">

<h4>Skills</h4>

<textarea id="skills" class="form-control mb-3" placeholder="Your Skills"></textarea>

<button onclick="generateCV()" class="btn btn-primary">
Generate CV
</button>

</div>


<!-- CV PREVIEW -->
<div class="col-md-6">

<div id="cvTemplate" class="cv-box">

<h2 id="cvName">Your Name</h2>

<p><b>Email:</b> <span id="cvEmail"></span></p>

<p><b>Phone:</b> <span id="cvPhone"></span></p>

<p><b>Address:</b> <span id="cvAddress"></span></p>

<hr>

<h4>Education</h4>

<p id="cvEducation"></p>

<hr>

<h4>Skills</h4>

<p id="cvSkills"></p>

<button onclick="printCV()" class="btn btn-success">
Export / Print CV
</button>

</div>

</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
